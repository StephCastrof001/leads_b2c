## 📋 BASE DE DATOS: FIRESTORE SCHEMA COMPLETO

```yaml
# Nivel 1: User Main Document
users/{uid}
├─ wizard
│  ├─ websiteUrl, selectedAccount, analysisId
│  ├─ selectedAccount (pk, username, full_name, follower_count, following_count, is_verified, is_private)
│  ├─ analysisId, completed, currentStep
│  ├─ generatedEmails (array de 3-5 emails con templates)
│  ├─ relatedAccounts (array de 10-50 accounts con bio, followers, has_email)
│  └─ businessAnalysis (name, targetAudience, description, industry)
├─ plan (free, starter, enterprise, unlimited)
├─ aiCredits (balance, totalUsed, monthlyAllocation, totalPurchased)
├─ emailSender (requestsToday, limits)
├─ stripeId (ej: cus_UPQWtJlyFN2Ol0)
└─ stripeSubscriptionId (ej: sub_1TQbftGYwHFEIfB6rZ78nN9E)

# Nivel 2: Analysis Subcollection
users/{uid}/analysis/{analysisId}
├─ name, mode (followers/following/commenters/hashtag/location)
├─ status (PENDING/RUNNING/COMPLETED/FAILED)
├─ isCloud (true/false)
├─ selectedItem (pk, username, full_name, follower_count, following_count)
├─ prospectsCount, publicAccountsCount, privateAccountsCount, businessAccountsCount
├─ emailsFoundCount, creditsUsed
├─ consecutiveBatchFailures, noCursorRetryCount
├─ createdAt, completedAt (Firestore timestamps _seconds/_nanoseconds)

# Nivel 3: Prospects Subcollection
users/{uid}/prospects/{prospectId}
├─ pk, username, id, full_name, biography, email, phone_number, website
├─ followers, following, is_business, is_private, is_verified, verified_type
├─ category, city, profile_pic_url, cover_pic_url
├─ source_type (instagram)
├─ analysis (array de analysisIds)
└─ createdAt, scraped_at (Firestore timestamps)

# Nivel 4: Campaigns Subcollection (probable)
users/{uid}/campaigns/{campaignId}
├─ name, status (DRAFT/QUEUED/SENDING/SENT/COMPLETED/FAILED)
├─ inbox (google, microsoft, azure)
├─ to_emails, from_email, subject, html
├─ scheduledAt, sentAt, openedAt, clickedAt, repliedAt
└─ metrics (opens, clicks, replies, unsubscribes, bounces)
```

