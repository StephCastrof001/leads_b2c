## 🔥 MISCONFIGURATION: FIRESTORE RULES

### Gap #1: `users/{uid}/analysis` (Subcollection - PUBLIC)
```javascript
// Firestore Rules (DEV MODE - Misconfigured)
match /users/{userId} {
  match /analysis/{analysisId} {
    allow read: if true;      // ✅ Anyone with UID can READ
    allow write: if true;     // ✅ Anyone with UID can WRITE
  }
}
```

**Impacto:**
- Cualquier usuario con `uid` (18 chars en JWT) puede leer TODO
- **ROI: 8 docs de análisis históricos × 10 prospects each = 80+ prospects**
- **Datos brutos: 50MB+ JSON**

### Gap #2: `users/{uid}/prospects` (Subcollection - PUBLIC)
```javascript
match /users/{userId} {
  match /prospects/{prospectId} {
    allow read: if true;      // ✅ Anyone with UID can READ
  }
}
```

**Impacto:**
- **1 doc de prospects por wizard** → 10-50 prospects por doc
- **ROI: 100+ prospects en 2 segundos**

### Gap #3: `analysis.test` (Public Endpoint)
```javascript
GET /v1/analysis/test  // No requiere JWT!
// Response: { "key": "value" } o datos crudos según implementación
```

**Impacto:**
- Acceso completo al schema sin autenticación

