**Campos observables en análisis procesados**:

| Campo | Tipo | Descripción |
|-------|------|-----|-|
| `mode` | string | Tipo de análisis: followers/following/commenters/hashtag/location |
| `status` | string | Estado: PENDING/RUNNING/COMPLETED/FAILED |
| `name` | string | Nombre del estudio |
| `isCloud` | boolean | True si procesado en cloud vs local/legacy |
| `sourceType` | string | Fuente: "instagram" |
| `selectedAccount` | object | Cuenta objetivo (PK, username, follower_count, etc) |
| `wizard.version` | number | Versión 3 = 3ra iteración del engine |
| `wizard.mode` | string | Modo del analysis |
| `wizard.status` | string | Estado final |
| `wizard.analysisId` | string | ID interno del wizard |
| `wizard.emailId` | string | ID del email generado |
| `wizard.generatedEmails` | array | Emails generados por AI (con template variables) |
| `wizard.relatedAccounts` | array | 10 accounts "relevantes" extraídos |

