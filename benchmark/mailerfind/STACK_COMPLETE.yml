## 🔄 PIPELINE COMPLETO (De frontend a backend)

```
Flow 1 - Login:
1. Frontend: signInWithEmailAndPassword()
2. Auth: Firebase ID Token (JWT)
3. Firestore: users/{uid} created
   ├─ wizard.analysisId: "SpMkSYd5y0VwkIOO6ivL"
   ├─ wizard.relatedAccounts: [10 accounts]
   ├─ wizard.generatedEmails: [3 emails]

Flow 2 - Analysis Request:
4. Frontend: POST /v1/analysis/create
   Body: { mode: "followers", selectedItem: { pk: 123 } }
5. Cloud Function:
   ├─ Firestore: Create doc in users/{uid}/analysis/{analysisId}
   ├─ Queue: POST /v1/queue/add-analysis
   ├─ Worker: Process analysis (scrapers)
   ├─ Update: Change status to COMPLETED
   └─ Write: Create 10 docs in users/{uid}/prospects

Flow 3 - Email Generation:
6. Frontend: wizard.generatedEmails (after AI processing)
   3 emails con variables {{ first_name }}, {{ username }}
   
7. Frontend: Send emails via /v1/email/send-email/{to}
   1 credit por email (AI + sending)
```

