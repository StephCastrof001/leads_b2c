**Firestore Collections (subcollections en users/{uid})**:
- `users/{uid}/analysis` → **8+ docs (PROCESADO, PUBLIC READ)**
- `users/{uid}/prospects` → **1 doc (PROCESADO, PUBLIC READ)**
- `users/{uid}/campaigns` → Permission denied (rules restricción)

